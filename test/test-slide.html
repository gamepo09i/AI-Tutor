<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test Slide</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fb;
      color: #172033;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .slide {
      width: min(90vw, 960px);
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
      background: #ffffff;
      border: 1px solid #d8deea;
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(23, 32, 51, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 14vw, 8rem);
      font-weight: 800;
      letter-spacing: 0;
      text-transform: lowercase;
    }
  </style>
</head>
<body>
  <main class="slide" aria-label="Test slide">
    <h1>test</h1>
  </main>
</body>
</html>
